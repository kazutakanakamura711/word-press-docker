; Dockerコンテナ内のPHPに適用するカスタム設定ファイル
; デフォルト値が小さいため、WordPress運用に適した値に引き上げている

; アップロードできるファイルの最大サイズ（画像・動画などのメディアアップロード上限）
upload_max_filesize = 64M

; POSTデータ全体の最大サイズ（upload_max_filesizeと同じか大きい値にする必要がある）
post_max_size = 64M

; PHPスクリプトが使用できるメモリの上限
memory_limit = 256M

; PHPスクリプトの最大実行時間（秒）。大きい画像の処理やインポート時のタイムアウト防止
max_execution_time = 300
